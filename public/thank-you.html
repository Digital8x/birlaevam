<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Birla Evam Manjri</title>
  <link class="brand-favicon" rel="icon" href="/assets/images/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css?v=1.3">
  <style>
    .thankyou-box {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: var(--bg-light);
      background-image: radial-gradient(rgba(134, 31, 105, 0.01) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .thankyou-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(15px);
      border: 1px dashed var(--border-dashed);
      border-radius: var(--radius-md);
      padding: 60px 48px;
      max-width: 580px;
      width: 100%;
      box-shadow: 0 15px 45px rgba(31, 10, 27, 0.04);
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .thankyou-card i {
      font-size: 4rem;
      color: var(--accent);
      margin-bottom: 24px;
    }
    .thankyou-card h1 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: var(--primary);
      margin-bottom: 16px;
      font-weight: 400;
    }
    .thankyou-card p {
      font-size: 1rem;
      color: var(--text-dark);
      margin-bottom: 36px;
      line-height: 1.7;
      font-weight: 300;
    }
  </style>

  <!-- Google tag (gtag.js) -->

  <!-- Event snippet for Evam Birla conversion page -->

</head>
<body>
  <div class="thankyou-box">
    <div class="thankyou-card">
      <i class="fa-solid fa-circle-check"></i>
      <h1>Thank You!</h1>
      <p>Your premium enquiry has been successfully logged. Our expert property representative will call you shortly to share private brochures, layouts, and custom payment schedules.</p>
      <a href="/" class="btn btn--primary" style="display: inline-block;">Return to Homepage. →</a>
